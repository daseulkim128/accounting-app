<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회계 통계</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        /* 전체 페이지 기본 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            transition: background 0.3s ease;
        }

        body.dark-mode .container {
            background: #0f3460;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* 페이지 제목 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        body.dark-mode .title {
            color: #e0e0e0;
        }

        /* 헤더 버튼들 */
        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .back-btn,
        .theme-toggle {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn:hover,
        .theme-toggle:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        body.dark-mode .back-btn,
        body.dark-mode .theme-toggle {
            background: #764ba2;
        }

        body.dark-mode .back-btn:hover,
        body.dark-mode .theme-toggle:hover {
            background: #667eea;
        }

        /* 통계 카드 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: bold;
        }

        /* 차트 섹션 */
        .chart-section {
            margin-bottom: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: background 0.3s ease;
        }

        body.dark-mode .chart-section {
            background: #1a2332;
        }

        .chart-section h3 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        body.dark-mode .chart-section h3 {
            color: #e0e0e0;
        }

        /* 차트 컨테이너 */
        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 20px;
        }

        /* 테이블 섹션 */
        .table-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            transition: background 0.3s ease;
        }

        body.dark-mode .table-section {
            background: #1a2332;
        }

        .table-section h3 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        body.dark-mode .table-section h3 {
            color: #e0e0e0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: #667eea;
            color: white;
        }

        table th {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        table td {
            padding: 12px 15px;
            text-align: center;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
        }

        body.dark-mode table td {
            color: #e0e0e0;
            border-bottom-color: #2a3f5f;
        }

        table tbody tr:hover {
            background: #f5f5f5;
        }

        body.dark-mode table tbody tr:hover {
            background: #2a3f5f;
        }

        /* 수입/지출 색상 */
        .income-text {
            color: #51cf66;
            font-weight: bold;
        }

        .expense-text {
            color: #ff6b6b;
            font-weight: bold;
        }

        .profit-text {
            color: #667eea;
            font-weight: bold;
        }

        /* 반응형 설정 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .title {
                font-size: 24px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- 메인 컨테이너 -->
    <div class="container">
        <!-- 페이지 헤더 -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="title">📈 회계 통계</div>
                <div style="display: flex; gap: 10px;">
                    <button class="back-btn" onclick="selectStatsYear(2024)">2024년</button>
                    <button class="back-btn" onclick="selectStatsYear(2025)">2025년</button>
                    <button class="back-btn" onclick="selectStatsYear(2026)">2026년</button>
                    <span id="statsYearDisplay" style="font-weight: bold; color: white; margin-left: 10px;">2026년</span>
                </div>
            </div>
            <div class="header-buttons">
                <button class="back-btn" onclick="goBackToAccounting()">← 돌아가기</button>
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>
        </div>

        <!-- 통계 카드 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">총 수입</div>
                <div class="stat-value" id="totalIncomeValue">0원</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">총 지출</div>
                <div class="stat-value" id="totalExpenseValue">0원</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">순이익</div>
                <div class="stat-value" id="netProfitValue">0원</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">수익률</div>
                <div class="stat-value" id="profitRateValue">0%</div>
            </div>
        </div>

        <!-- 월별 수입/지출 차트 -->
        <div class="chart-section">
            <h3>📊 월별 수입/지출 현황</h3>
            <div class="chart-container">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>

        <!-- 누적 수익 차트 -->
        <div class="chart-section">
            <h3>📈 누적 수익 추이</h3>
            <div class="chart-container">
                <canvas id="cumulativeChart"></canvas>
            </div>
        </div>

        <!-- 지출 카테고리 분석 차트 -->
        <div class="chart-section">
            <h3>💸 지출 카테고리 분석</h3>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- 월별 상세 통계 테이블 -->
        <div class="table-section">
            <h3>📋 월별 상세 통계</h3>
            <table>
                <thead>
                    <tr>
                        <th>월</th>
                        <th>수입</th>
                        <th>지출</th>
                        <th>순이익</th>
                        <th>지출률</th>
                    </tr>
                </thead>
                <tbody id="monthlyTable">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script>
        // ===== Firebase 초기화 =====
        const firebaseConfig = {
            apiKey: "AIzaSyCM4RdunrPLGXW3AN2QX8q5oo_ppGlc9aA",
            authDomain: "accounting-app-f1bca.firebaseapp.com",
            projectId: "accounting-app-f1bca",
            storageBucket: "accounting-app-f1bca.firebasestorage.app",
            messagingSenderId: "580950547783",
            appId: "1:580950547783:web:e0214f10ddf507dcfb0062",
            measurementId: "G-6G21YEDHCG"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Firestore에서 불러온 데이터를 { year: { month: [...] } } 형태로 캐시
        let accountingData = {};

        // 현재 선택된 년도
        let currentYear = 2026;

        // ===== Firestore에서 선택 연도 전체 데이터 로드 =====
        async function loadAccountingDataFromFirestore(year) {
            try {
                const snapshot = await db.collection("transactions")
                    .where("year", "==", year)
                    .get();

                const yearData = {};
                snapshot.forEach((doc) => {
                    const transaction = doc.data();
                    if (!yearData[transaction.month]) {
                        yearData[transaction.month] = [];
                    }
                    yearData[transaction.month].push({ id: doc.id, ...transaction });
                });

                accountingData[year] = yearData;
            } catch (error) {
                console.error("Firestore 통계 데이터 조회 실패:", error);
                accountingData[year] = {};
            }
        }

        // 월 이름 배열
        const monthNames = ['', '1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];

        // ===== 데이터 계산 함수 =====

        // 이전 월 마지막 잔액 계산
        function getPreviousMonthBalance(month) {
            if (month <= 1) return 0;

            const previousTransactions = accountingData[month - 1] || [];
            let balance = 0;

            previousTransactions.forEach(transaction => {
                if (transaction.type === 'income') {
                    balance += transaction.amount;
                } else {
                    balance -= transaction.amount;
                }
            });

            return balance;
        }

        // 월별 통계 계산 (이월금 제외)
        function calculateMonthlyStats() {
            const stats = {};

            // 각 월에 대해 계산
            for (let month = 1; month <= 12; month++) {
                const transactions = (accountingData[currentYear] && accountingData[currentYear][month]) || [];
                let income = 0;
                let expense = 0;

                transactions.forEach(transaction => {
                    if (transaction.type === 'income') {
                        income += transaction.amount;
                    } else {
                        expense += transaction.amount;
                    }
                });

                // 순이익 (이월금 제외 - 순수 월별 수입/지출만)
                const monthProfit = income - expense;

                stats[month] = {
                    income: income,
                    expense: expense,
                    profit: monthProfit,
                    expenseRate: income > 0 ? ((expense / income) * 100).toFixed(1) : 0
                };
            }

            return stats;
        }

        // 지출 카테고리 계산
        function calculateExpenseCategories() {
            const categories = {};

            for (let month = 1; month <= 12; month++) {
                const transactions = (accountingData[currentYear] && accountingData[currentYear][month]) || [];

                transactions.forEach(transaction => {
                    if (transaction.type === 'expense') {
                        // 설명에서 카테고리 추출
                        const category = extractCategory(transaction.desc);
                        if (!categories[category]) {
                            categories[category] = 0;
                        }
                        categories[category] += transaction.amount;
                    }
                });
            }

            return categories;
        }

        // 설명에서 카테고리 추출
        function extractCategory(desc) {
            if (desc.includes('인건비') || desc.includes('일용직')) {
                return '인건비';
            } else if (desc.includes('연료비') || desc.includes('연료')) {
                return '연료비';
            } else if (desc.includes('자재비') || desc.includes('자재')) {
                return '자재비';
            } else if (desc.includes('장비')) {
                return '장비비';
            } else if (desc.includes('보험')) {
                return '보험료';
            } else if (desc.includes('사무') || desc.includes('통신')) {
                return '사무비';
            } else if (desc.includes('차량') || desc.includes('유지')) {
                return '차량유지비';
            } else if (desc.includes('안전')) {
                return '안전용품';
            } else {
                return '기타';
            }
        }

        // 통계값 업데이트
        function updateStatCards() {
            const stats = calculateMonthlyStats();
            let totalIncome = 0;
            let totalExpense = 0;

            for (let month = 1; month <= 7; month++) {
                totalIncome += stats[month].income;
                totalExpense += stats[month].expense;
            }

            const netProfit = totalIncome - totalExpense;
            const profitRate = totalIncome > 0 ? ((netProfit / totalIncome) * 100).toFixed(1) : 0;

            document.getElementById('totalIncomeValue').innerText = totalIncome.toLocaleString() + '원';
            document.getElementById('totalExpenseValue').innerText = totalExpense.toLocaleString() + '원';
            document.getElementById('netProfitValue').innerText = netProfit.toLocaleString() + '원';
            document.getElementById('profitRateValue').innerText = profitRate + '%';
        }

        // 월별 테이블 업데이트
        function updateMonthlyTable() {
            const stats = calculateMonthlyStats();
            const tableBody = document.getElementById('monthlyTable');
            tableBody.innerHTML = '';

            for (let month = 1; month <= 7; month++) {
                const stat = stats[month];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${monthNames[month]}</strong></td>
                    <td class="income-text">${stat.income.toLocaleString()}원</td>
                    <td class="expense-text">${stat.expense.toLocaleString()}원</td>
                    <td class="profit-text">${stat.profit.toLocaleString()}원</td>
                    <td>${stat.expenseRate}%</td>
                `;
                tableBody.appendChild(row);
            }
        }

        // ===== 차트 생성 =====

        let monthlyChartInstance;
        let cumulativeChartInstance;
        let categoryChartInstance;

        function createMonthlyChart() {
            const stats = calculateMonthlyStats();
            const months = [];
            const incomeData = [];
            const expenseData = [];

            for (let month = 1; month <= 7; month++) {
                months.push(monthNames[month]);
                incomeData.push(stats[month].income);
                expenseData.push(stats[month].expense);
            }

            const ctx = document.getElementById('monthlyChart').getContext('2d');

            if (monthlyChartInstance) {
                monthlyChartInstance.destroy();
            }

            monthlyChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [
                        {
                            label: '수입',
                            data: incomeData,
                            backgroundColor: '#51cf66',
                            borderRadius: 5,
                            borderSkipped: false
                        },
                        {
                            label: '지출',
                            data: expenseData,
                            backgroundColor: '#ff6b6b',
                            borderRadius: 5,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333',
                                callback: function(value) {
                                    return (value / 1000000).toFixed(1) + 'M';
                                }
                            },
                            grid: {
                                color: document.body.classList.contains('dark-mode') ? '#2a3f5f' : '#e0e0e0'
                            }
                        },
                        x: {
                            ticks: {
                                color: document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333'
                            },
                            grid: {
                                color: document.body.classList.contains('dark-mode') ? '#2a3f5f' : '#e0e0e0'
                            }
                        }
                    }
                }
            });
        }

        function createCumulativeChart() {
            const stats = calculateMonthlyStats();
            const months = [];
            const cumulativeProfits = [];
            let runningProfit = 0;

            for (let month = 1; month <= 7; month++) {
                months.push(monthNames[month]);
                // 순이익만 누적 (이월금 제외)
                runningProfit += stats[month].profit;
                cumulativeProfits.push(runningProfit);
            }

            const ctx = document.getElementById('cumulativeChart').getContext('2d');

            if (cumulativeChartInstance) {
                cumulativeChartInstance.destroy();
            }

            cumulativeChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [
                        {
                            label: '누적 순이익',
                            data: cumulativeProfits,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 6,
                            pointBackgroundColor: '#667eea',
                            pointBorderColor: 'white',
                            pointBorderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333',
                                callback: function(value) {
                                    return (value / 1000000).toFixed(1) + 'M';
                                }
                            },
                            grid: {
                                color: document.body.classList.contains('dark-mode') ? '#2a3f5f' : '#e0e0e0'
                            }
                        },
                        x: {
                            ticks: {
                                color: document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333'
                            },
                            grid: {
                                color: document.body.classList.contains('dark-mode') ? '#2a3f5f' : '#e0e0e0'
                            }
                        }
                    }
                }
            });
        }

        function createCategoryChart() {
            const categories = calculateExpenseCategories();
            const categoryNames = Object.keys(categories);
            const categoryAmounts = Object.values(categories);

            const ctx = document.getElementById('categoryChart').getContext('2d');

            if (categoryChartInstance) {
                categoryChartInstance.destroy();
            }

            // 차트 색상
            const colors = [
                '#667eea', '#764ba2', '#51cf66', '#ff6b6b',
                '#ffd43b', '#ff8c42', '#00d4ff', '#9c27b0'
            ];

            categoryChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categoryNames,
                    datasets: [
                        {
                            data: categoryAmounts,
                            backgroundColor: colors.slice(0, categoryNames.length),
                            borderColor: document.body.classList.contains('dark-mode') ? '#1a2332' : 'white',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333',
                                padding: 20,
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.label + ': ' + context.parsed.toLocaleString() + '원';
                                }
                            }
                        }
                    }
                }
            });
        }

        // ===== 년도 선택 함수 =====
        async function selectStatsYear(year) {
            currentYear = year;
            document.getElementById('statsYearDisplay').innerText = year + '년';
            await refreshStats();
        }

        // ===== 테마 토글 =====

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }

            // 차트 다시 그리기 (텍스트 색상 변경 반영)
            createMonthlyChart();
            createCumulativeChart();
            createCategoryChart();
        }

        // ===== 뒤로가기 =====

        function goBackToAccounting() {
            window.location.href = 'accounting.html';
        }

        // ===== 통계 업데이트 함수 =====
        async function refreshStats() {
            await loadAccountingDataFromFirestore(currentYear);
            updateStatCards();
            updateMonthlyTable();
            createMonthlyChart();
            createCumulativeChart();
            createCategoryChart();
        }

        // ===== 페이지 로드 시 초기화 =====

        window.addEventListener('load', async function() {
            // 저장된 테마 설정 불러오기
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }

            // 통계값 업데이트
            await refreshStats();

            // 페이지 포커스가 돌아올 때 데이터 다시 로드
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    // 페이지가 다시 보일 때 최신 데이터로 업데이트
                    refreshStats();
                }
            });

            // 창 포커스 돌아올 때도 데이터 다시 로드
            window.addEventListener('focus', function() {
                refreshStats();
            });
        });
    </script>
</body>
</html>
