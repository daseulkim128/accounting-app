<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회계장부</title>
    <style>
        /* 전체 페이지 기본 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            transition: background 0.3s ease;
        }

        body.dark-mode .container {
            background: #0f3460;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* 페이지 제목 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        body.dark-mode .title {
            color: #e0e0e0;
        }

        /* 헤더 버튼들 컨테이너 */
        .header-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* 테마 토글 버튼과 다운로드 버튼 공통 스타일 */
        .theme-toggle,
        .download-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .theme-toggle:hover,
        .download-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        body.dark-mode .theme-toggle,
        body.dark-mode .download-btn {
            background: #764ba2;
        }

        body.dark-mode .theme-toggle:hover,
        body.dark-mode .download-btn:hover {
            background: #667eea;
        }

        /* ===== 월 선택 섹션 ===== */
        .month-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .month-btn {
            padding: 12px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        body.dark-mode .month-btn {
            background: #1a2332;
            color: #667eea;
            border-color: #667eea;
        }

        /* 선택된 월 버튼 스타일 */
        .month-btn.active {
            background: #667eea;
            color: white;
        }

        .month-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        /* ===== 데이터 입력 섹션 ===== */
        .input-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
        }

        body.dark-mode .input-section {
            background: #1a2332;
            border-color: #2a3f5f;
        }

        .input-section h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        body.dark-mode .input-section h3 {
            color: #e0e0e0;
        }

        /* 입력 폼 그리드 */
        .form-group {
            display: grid;
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 입력 필드 공통 스타일 */
        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        body.dark-mode input,
        body.dark-mode select {
            background: #0f3460 !important;
            color: #e0e0e0 !important;
            border-color: #2a3f5f !important;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        /* 추가 버튼 */
        .add-btn {
            background: #51cf66;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
            align-self: center;
        }

        .add-btn:hover {
            background: #40c057;
            transform: translateY(-2px);
        }

        /* ===== 회계 테이블 섹션 ===== */
        .table-section {
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .table-section h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        body.dark-mode .table-section h3 {
            color: #e0e0e0;
        }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode table {
            background: #1a2332;
        }

        /* 테이블 헤더 */
        table thead {
            background: #667eea;
            color: white;
        }

        body.dark-mode table thead {
            background: #764ba2;
        }

        table th {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        /* 테이블 바디 */
        table tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s ease;
        }

        body.dark-mode table tbody tr {
            border-bottom-color: #2a3f5f;
        }

        table tbody tr:hover {
            background: #f5f5f5;
        }

        body.dark-mode table tbody tr:hover {
            background: #2a3f5f;
        }

        table td {
            padding: 12px 15px;
            text-align: center;
            font-size: 14px;
            color: #333;
        }

        body.dark-mode table td {
            color: #e0e0e0;
        }

        /* 날짜 열은 왼쪽 정렬 */
        table td:first-child {
            text-align: left;
            font-weight: bold;
        }

        /* 수입 금액 - 녹색 */
        .income {
            color: #51cf66;
            font-weight: bold;
        }

        /* 지출 금액 - 빨강 */
        .expense {
            color: #ff6b6b;
            font-weight: bold;
        }

        /* 잔액 */
        .balance {
            font-weight: bold;
            color: #667eea;
        }

        body.dark-mode .balance {
            color: #82b1ff;
        }

        /* 빈 상태 메시지 */
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        body.dark-mode .empty-message {
            color: #888;
        }

        /* ===== 월말 합계 섹션 ===== */
        .summary-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .summary-card {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .summary-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: bold;
        }

        /* 합계별 색상 구분 */
        .total-income .summary-value {
            color: #51cf66;
        }

        .total-expense .summary-value {
            color: #ff9999;
        }

        .total-balance .summary-value {
            color: #fff;
        }

        /* 설명 텍스트 */
        .description-column {
            max-width: 200px;
            white-space: normal;
            word-break: break-word;
        }

        /* 삭제 버튼 */
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        /* 체크박스 스타일 */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        /* 선택된 행 스타일 */
        table tbody tr.selected {
            background: rgba(102, 126, 234, 0.1);
        }

        body.dark-mode table tbody tr.selected {
            background: rgba(102, 126, 234, 0.2);
        }

        /* 월초 이월금 행 스타일 */
        table tbody tr.carryover-row {
            background: #f0f0f0;
            font-weight: bold;
        }

        body.dark-mode table tbody tr.carryover-row {
            background: #1f2937;
        }

        /* 반응형 모바일 설정 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .title {
                font-size: 24px;
            }

            .summary-section {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            table th, table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <!-- 메인 컨테이너 -->
    <div class="container">
        <!-- 페이지 헤더 -->
        <div class="header">
            <div class="title">📊 회계장부</div>
            <div class="header-buttons">
                <button class="download-btn" onclick="downloadExcel()">📥 엑셀 다운로드</button>
                <button class="download-btn" onclick="goToStats()">📈 통계</button>
                <button class="download-btn" onclick="loadSampleData()" style="background: #ff8c42;">📋 샘플데이터</button>
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>
        </div>

        <!-- 년도 및 월 선택 섹션 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap;">
            <!-- 년도 선택 -->
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="month-btn" onclick="selectYear(2024)">2024년</button>
                <button class="month-btn" onclick="selectYear(2025)">2025년</button>
                <button class="month-btn active" onclick="selectYear(2026)">2026년</button>
                <span id="yearDisplay" style="font-weight: bold; color: #667eea; margin-left: 10px;">2026년</span>
            </div>
        </div>

        <!-- 월 선택 버튼들 -->
        <div class="month-selector">
            <button class="month-btn active" onclick="selectMonth(1)">1월</button>
            <button class="month-btn" onclick="selectMonth(2)">2월</button>
            <button class="month-btn" onclick="selectMonth(3)">3월</button>
            <button class="month-btn" onclick="selectMonth(4)">4월</button>
            <button class="month-btn" onclick="selectMonth(5)">5월</button>
            <button class="month-btn" onclick="selectMonth(6)">6월</button>
            <button class="month-btn" onclick="selectMonth(7)">7월</button>
            <button class="month-btn" onclick="selectMonth(8)">8월</button>
            <button class="month-btn" onclick="selectMonth(9)">9월</button>
            <button class="month-btn" onclick="selectMonth(10)">10월</button>
            <button class="month-btn" onclick="selectMonth(11)">11월</button>
            <button class="month-btn" onclick="selectMonth(12)">12월</button>
        </div>

        <!-- 데이터 입력 섹션 -->
        <div class="input-section">
            <h3>💰 거래 입력</h3>
            <div class="form-group" style="grid-template-columns: 0.8fr 0.8fr 0.8fr 1fr 1fr auto; gap: 8px;">
                <!-- 연도 선택 -->
                <select id="transactionYear" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">연도</option>
                </select>

                <!-- 월 선택 -->
                <select id="transactionMonth" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">월</option>
                </select>

                <!-- 일 선택 -->
                <select id="transactionDay" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">일</option>
                </select>

                <!-- 거래 유형 선택 (수입/지출) -->
                <select id="transactionType">
                    <option value="income">수입</option>
                    <option value="expense">지출</option>
                </select>

                <!-- 금액 입력 -->
                <input
                    type="text"
                    id="transactionAmount"
                    placeholder="금액"
                    oninput="formatAmountInput(this)"
                >

                <!-- 추가 버튼 -->
                <button class="add-btn" onclick="addTransaction()">추가</button>
            </div>

            <!-- 거래 설명 -->
            <div style="margin-top: 15px;">
                <input
                    type="text"
                    id="transactionDesc"
                    placeholder="설명 (예: 월급, 식비)"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;"
                >
            </div>
        </div>

        <!-- 거래 내역 테이블 -->
        <div class="table-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">📋 거래 내역</h3>
                <button class="delete-btn" id="deleteSelectedBtn" onclick="deleteSelected()" style="display: none; background: #ff6b6b;">🗑️ 선택 삭제</button>
            </div>
            <table id="transactionTable">
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                        <th>날짜</th>
                        <th>수입</th>
                        <th>지출</th>
                        <th>잔액</th>
                        <th>설명</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="6" class="empty-message">거래 내역이 없습니다. 거래를 입력해주세요.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 월말 합계 섹션 -->
        <div class="summary-section">
            <div class="summary-card total-income">
                <div class="summary-label">이달 수입</div>
                <div class="summary-value" id="totalIncome">0원</div>
            </div>
            <div class="summary-card total-expense">
                <div class="summary-label">이달 지출</div>
                <div class="summary-value" id="totalExpense">0원</div>
            </div>
            <div class="summary-card total-balance">
                <div class="summary-label">월말 잔액</div>
                <div class="summary-value" id="totalBalance">0원</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script>
        // ===== Firebase 초기화 =====
        const firebaseConfig = {
            apiKey: "AIzaSyCM4RdunrPLGXW3AN2QX8q5oo_ppGlc9aA",
            authDomain: "accounting-app-f1bca.firebaseapp.com",
            projectId: "accounting-app-f1bca",
            storageBucket: "accounting-app-f1bca.firebasestorage.app",
            messagingSenderId: "580950547783",
            appId: "1:580950547783:web:e0214f10ddf507dcfb0062",
            measurementId: "G-6G21YEDHCG"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ===== 회계장부 데이터 관리 =====

        // 현재 선택된 년도와 월
        let currentYear = new Date().getFullYear();
        let currentMonth = 1;

        // 화면에 표시 중인 현재 월 거래 캐시 (삭제/다운로드 시 재사용)
        let currentTransactions = [];

        // ===== 년도 선택 함수 =====
        async function selectYear(year) {
            currentYear = year;

            // 년도 버튼 active 클래스 업데이트
            document.querySelectorAll('.month-selector ~ div button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 년도 표시 업데이트
            document.getElementById('yearDisplay').innerText = year + '년';

            // 선택된 년도/월의 거래 내역 표시
            await displayTransactions();
        }

        // ===== 월 선택 함수 =====
        async function selectMonth(month) {
            // 현재 월 업데이트
            currentMonth = month;

            // 이전 선택된 버튼의 'active' 클래스 제거
            document.querySelectorAll('.month-selector .month-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 새로 선택된 버튼에 'active' 클래스 추가
            event.target.classList.add('active');

            // 선택된 월의 거래 내역 표시
            await displayTransactions();
        }

        // ===== Firestore에서 데이터 로드 =====
        async function loadTransactionsFromFirestore(year, month) {
            try {
                // year+month 이중 조건에 orderBy까지 걸면 Firestore 복합 색인이 필요해지므로,
                // 정렬은 결과를 받은 뒤 클라이언트에서 처리한다 (한 달치라 데이터량이 적어 부담 없음)
                const snapshot = await db.collection("transactions")
                    .where("year", "==", year)
                    .where("month", "==", month)
                    .get();

                const transactions = [];
                snapshot.forEach((doc) => {
                    transactions.push({ id: doc.id, ...doc.data() });
                });

                transactions.sort((a, b) => new Date(a.date) - new Date(b.date));

                return transactions;
            } catch (error) {
                console.error("Firestore 조회 실패:", error);
                alert('데이터를 불러오는 중 오류가 발생했습니다: ' + error.message);
                return [];
            }
        }

        // ===== 금액 실시간 포맷팅 함수 =====
        function formatAmountInput(input) {
            // 숫자만 추출
            let value = input.value.replace(/[^\d]/g, '');

            // 컴마 추가
            if (value) {
                value = parseInt(value).toLocaleString();
            }

            input.value = value;
        }

        // ===== 선택 박스 초기화 함수 =====
        function initializeDateSelectors() {
            // 연도 셀렉트 박스 채우기 (2025-2035)
            const yearSelect = document.getElementById('transactionYear');
            yearSelect.innerHTML = '<option value="">연도</option>';
            for (let year = 2025; year <= 2035; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.text = year + '년';
                yearSelect.appendChild(option);
            }

            // 월 셀렉트 박스 채우기
            const monthSelect = document.getElementById('transactionMonth');
            monthSelect.innerHTML = '<option value="">월</option>';
            for (let month = 1; month <= 12; month++) {
                const option = document.createElement('option');
                option.value = month.toString().padStart(2, '0');
                option.text = month + '월';
                monthSelect.appendChild(option);
            }

            // 일 셀렉트 박스 채우기
            const daySelect = document.getElementById('transactionDay');
            daySelect.innerHTML = '<option value="">일</option>';
            for (let day = 1; day <= 31; day++) {
                const option = document.createElement('option');
                option.value = day.toString().padStart(2, '0');
                option.text = day + '일';
                daySelect.appendChild(option);
            }
        }

        // ===== 거래 추가 함수 =====
        async function addTransaction() {
            // 입력 필드에서 값 가져오기
            const year = parseInt(document.getElementById('transactionYear').value);
            const month = parseInt(document.getElementById('transactionMonth').value);
            const day = parseInt(document.getElementById('transactionDay').value);
            const type = document.getElementById('transactionType').value;
            const amountText = document.getElementById('transactionAmount').value;
            const desc = document.getElementById('transactionDesc').value;

            // 입력값 검증 (모든 필드가 채워졌는지 확인)
            if (!year || !month || !day || !amountText || !desc) {
                alert('모든 필드를 입력해주세요!');
                return;
            }

            // 연도 검증
            if (year !== currentYear) {
                alert(`현재 선택된 연도는 ${currentYear}년입니다.\n${year}년 데이터는 입력할 수 없습니다.`);
                return;
            }

            // 월 검증
            if (month !== currentMonth) {
                alert(`현재 선택된 월은 ${currentMonth}월입니다.\n${month}월 데이터는 입력할 수 없습니다.`);
                return;
            }

            // 금액 파싱 (컴마 제거)
            const amount = parseFloat(amountText.replace(/,/g, ''));

            // 금액이 0 이상인지 확인
            if (amount <= 0) {
                alert('금액은 0보다 커야 합니다!');
                return;
            }

            // 날짜 조합 (YYYY-MM-DD 형식)
            const date = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;

            try {
                // Firestore에 저장
                await db.collection("transactions").add({
                    year: year,
                    month: month,
                    date: date,
                    type: type,
                    amount: amount,
                    desc: desc,
                    createdAt: new Date()
                });

                // 입력 필드 초기화
                document.getElementById('transactionYear').value = '';
                document.getElementById('transactionMonth').value = '';
                document.getElementById('transactionDay').value = '';
                document.getElementById('transactionAmount').value = '';
                document.getElementById('transactionDesc').value = '';

                // 거래 내역 다시 로드
                await displayTransactions();

                alert('거래가 저장되었습니다! ✅');
            } catch (error) {
                console.error("Firestore 저장 실패:", error);
                alert('저장 중 오류가 발생했습니다: ' + error.message);
            }
        }

        // ===== 이전 월 마지막 잔액 계산 =====
        async function getPreviousMonthBalance(year, month) {
            let previousYear = year;
            let previousMonth = month - 1;

            // 1월이면 전년도 12월
            if (previousMonth < 1) {
                previousYear = year - 1;
                previousMonth = 12;
            }

            const previousTransactions = await loadTransactionsFromFirestore(previousYear, previousMonth);
            let balance = 0;

            previousTransactions.forEach(transaction => {
                if (transaction.type === 'income') {
                    balance += transaction.amount;
                } else {
                    balance -= transaction.amount;
                }
            });

            return balance;
        }

        // ===== 거래 내역 표시 함수 =====
        async function displayTransactions() {
            // 테이블 바디 선택
            const tableBody = document.getElementById('tableBody');
            const selectAll = document.getElementById('selectAll');

            // Firestore에서 데이터 로드
            const transactions = await loadTransactionsFromFirestore(currentYear, currentMonth);
            currentTransactions = transactions;

            // 전체 선택 체크박스 초기화
            selectAll.checked = false;

            // 전월 잔액 이월
            const previousBalance = await getPreviousMonthBalance(currentYear, currentMonth);

            // 거래가 없으면 빈 상태 메시지 표시
            if (transactions.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="empty-message">거래 내역이 없습니다. 거래를 입력해주세요.</td></tr>';
                updateSummary(transactions, previousBalance);
                updateDeleteButton();
                return;
            }

            // 테이블 내용 초기화
            tableBody.innerHTML = '';

            let runningBalance = previousBalance;

            // 전월 잔액이 있으면 첫 행에 이월금 표시
            if (previousBalance !== 0) {
                const carryOverRow = document.createElement('tr');
                carryOverRow.classList.add('carryover-row');
                carryOverRow.innerHTML = `
                    <td></td>
                    <td style="color: #667eea;">📌 월초 이월금</td>
                    <td></td>
                    <td></td>
                    <td class="balance" style="color: #667eea;">${previousBalance.toLocaleString()}원</td>
                    <td style="color: #888;">전월 이월</td>
                `;
                tableBody.appendChild(carryOverRow);
            }

            // 각 거래에 대해 테이블 행 생성
            transactions.forEach((transaction, index) => {
                // 거래 유형에 따라 잔액 계산
                if (transaction.type === 'income') {
                    // 수입이면 잔액 증가
                    runningBalance += transaction.amount;
                } else {
                    // 지출이면 잔액 감소
                    runningBalance -= transaction.amount;
                }

                // 테이블 행 생성
                const row = document.createElement('tr');
                row.setAttribute('data-index', index);

                // 날짜를 보기 좋은 형식으로 변환 (2024-01-15 → 1월 15일)
                const dateObj = new Date(transaction.date + 'T00:00:00');
                const formattedDate = (dateObj.getMonth() + 1) + '월 ' + dateObj.getDate() + '일';

                // 행의 HTML 작성 (체크박스 추가)
                row.innerHTML = `
                    <td><input type="checkbox" class="row-checkbox" onchange="updateDeleteButton()"></td>
                    <td>${formattedDate}</td>
                    <td class="${transaction.type === 'income' ? 'income' : ''}">${transaction.type === 'income' ? transaction.amount.toLocaleString() + '원' : ''}</td>
                    <td class="${transaction.type === 'expense' ? 'expense' : ''}">${transaction.type === 'expense' ? transaction.amount.toLocaleString() + '원' : ''}</td>
                    <td class="balance">${runningBalance.toLocaleString()}원</td>
                    <td class="description-column">${transaction.desc}</td>
                `;

                // 체크박스 클릭 시 행 강조 표시
                const checkbox = row.querySelector('.row-checkbox');
                checkbox.addEventListener('change', function() {
                    if (this.checked) {
                        row.classList.add('selected');
                    } else {
                        row.classList.remove('selected');
                    }
                });

                // 테이블에 행 추가
                tableBody.appendChild(row);
            });

            // 월말 합계 업데이트
            updateSummary(transactions, previousBalance);
            updateDeleteButton();
        }

        // ===== 전체 선택 토글 =====
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.row-checkbox');

            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
                const row = checkbox.closest('tr');
                if (selectAll.checked) {
                    row.classList.add('selected');
                } else {
                    row.classList.remove('selected');
                }
            });

            updateDeleteButton();
        }

        // ===== 선택 삭제 버튼 업데이트 =====
        function updateDeleteButton() {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            const selectedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
            const deleteBtn = document.getElementById('deleteSelectedBtn');

            if (selectedCount > 0) {
                deleteBtn.style.display = 'block';
                deleteBtn.innerText = `🗑️ 선택 삭제 (${selectedCount}개)`;
            } else {
                deleteBtn.style.display = 'none';
            }
        }

        // ===== 선택된 항목 일괄 삭제 =====
        async function deleteSelected() {
            const selectedCount = Array.from(document.querySelectorAll('.row-checkbox'))
                .filter(cb => cb.checked).length;

            if (selectedCount === 0) {
                alert('삭제할 항목을 선택해주세요!');
                return;
            }

            if (confirm(`${selectedCount}개의 거래를 삭제하시겠습니까?`)) {
                try {
                    const checkboxes = document.querySelectorAll('.row-checkbox');
                    const batch = db.batch();
                    let deleteCount = 0;

                    checkboxes.forEach((checkbox, index) => {
                        if (checkbox.checked && currentTransactions[index] && currentTransactions[index].id) {
                            batch.delete(db.collection("transactions").doc(currentTransactions[index].id));
                            deleteCount++;
                        }
                    });

                    // Firestore에서 일괄 삭제
                    await batch.commit();

                    // 거래 내역 다시 로드
                    await displayTransactions();

                    alert(`${deleteCount}개의 거래가 삭제되었습니다!`);
                } catch (error) {
                    console.error("Firestore 삭제 실패:", error);
                    alert('삭제 중 오류가 발생했습니다: ' + error.message);
                }
            }
        }


        // ===== 월말 합계 계산 및 표시 =====

        // 이달의 총 수입, 총 지출, 잔액 계산 (transactions/previousBalance는 displayTransactions에서 이미 조회한 값을 재사용)
        function updateSummary(transactions, previousBalance) {
            // 총 수입과 총 지출 계산
            let totalIncome = 0;  // 총 수입
            let totalExpense = 0; // 총 지출

            // 각 거래에 대해 수입/지출 합계 계산
            transactions.forEach(transaction => {
                if (transaction.type === 'income') {
                    // 수입 합계에 추가
                    totalIncome += transaction.amount;
                } else {
                    // 지출 합계에 추가
                    totalExpense += transaction.amount;
                }
            });

            // 전월 잔액 + 이달 순이익 = 월말 잔액
            const currentBalance = totalIncome - totalExpense;
            let totalBalance = previousBalance + currentBalance;

            // 합계를 화면에 표시
            document.getElementById('totalIncome').innerText = totalIncome.toLocaleString() + '원';
            document.getElementById('totalExpense').innerText = totalExpense.toLocaleString() + '원';
            document.getElementById('totalBalance').innerText = totalBalance.toLocaleString() + '원';
        }

        // ===== 다크모드 토글 함수 =====

        // 밝은 테마와 어두운 테마 전환
        function toggleTheme() {
            // body에 dark-mode 클래스 토글
            document.body.classList.toggle('dark-mode');

            // 사용자 선택을 로컬 스토리지에 저장
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }

        // ===== 엑셀 다운로드 함수 (CSV 형식) =====

        // 현재 월의 거래 내역을 CSV 파일로 다운로드
        function downloadExcel() {
            // 현재 화면에 표시 중인 거래 데이터 재사용
            const transactions = currentTransactions;

            // 거래가 없으면 알림
            if (transactions.length === 0) {
                alert('다운로드할 거래 내역이 없습니다!');
                return;
            }

            // 월 이름 배열 (1월 ~ 12월)
            const monthNames = ['', '1월', '2월', '3월', '4월', '5월', '6월',
                               '7월', '8월', '9월', '10월', '11월', '12월'];

            // CSV 데이터를 문자열로 생성
            let csvContent = '';

            // 제목
            csvContent += monthNames[currentMonth] + ' 회계장부\n\n';

            // 컬럼 헤더
            csvContent += '날짜,수입,지출,잔액,설명\n';

            // 거래를 날짜 순서로 정렬
            const sortedTransactions = [...transactions].sort((a, b) =>
                new Date(a.date) - new Date(b.date)
            );

            // 누적 잔액
            let runningBalance = 0;

            // 각 거래를 CSV 행으로 변환
            sortedTransactions.forEach(transaction => {
                // 거래 유형에 따라 잔액 계산
                if (transaction.type === 'income') {
                    runningBalance += transaction.amount;
                } else {
                    runningBalance -= transaction.amount;
                }

                // 날짜 포맷팅
                const dateObj = new Date(transaction.date + 'T00:00:00');
                const formattedDate = (dateObj.getMonth() + 1) + '월 ' + dateObj.getDate() + '일';

                // 수입/지출 구분
                const income = transaction.type === 'income' ? transaction.amount : '';
                const expense = transaction.type === 'expense' ? transaction.amount : '';

                // CSV 행 추가 (쉼표로 구분)
                csvContent += formattedDate + ',' +
                             income + ',' +
                             expense + ',' +
                             runningBalance + ',' +
                             '"' + transaction.desc + '"\n'; // 설명에는 큰따옴표로 감싸기
            });

            // 빈 행 추가
            csvContent += '\n';

            // 합계 행 계산
            let totalIncome = 0;
            let totalExpense = 0;
            transactions.forEach(transaction => {
                if (transaction.type === 'income') {
                    totalIncome += transaction.amount;
                } else {
                    totalExpense += transaction.amount;
                }
            });
            const totalBalance = totalIncome - totalExpense;

            // 합계 행 추가
            csvContent += '합계,' + totalIncome + ',' + totalExpense + ',' + totalBalance + ',\n';

            // Blob 객체 생성 (파일 데이터)
            const blob = new Blob(['﻿' + csvContent], { type: 'text/csv;charset=utf-8;' });

            // 임시 다운로드 링크 생성
            const link = document.createElement('a');

            // Blob 데이터를 URL로 변환
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);

            // 파일명: "회계장부_1월.csv" 형식
            const fileName = '회계장부_' + monthNames[currentMonth] + '.csv';
            link.setAttribute('download', fileName);

            // 링크를 페이지에 추가 (보이지는 않음)
            link.style.visibility = 'hidden';
            document.body.appendChild(link);

            // 클릭해서 다운로드 시작
            link.click();

            // 링크 제거
            document.body.removeChild(link);

            // 다운로드 완료 알림
            alert(fileName + ' 파일이 다운로드 되었습니다!\n(엑셀에서도 열 수 있습니다)');
        }

                // Firestore에 샘플 데이터 저장
                const batch = db.batch();

                for (let year in sampleData) {
                    for (let month in sampleData[year]) {
                        sampleData[year][month].forEach((transaction) => {
                            const docRef = db.collection("transactions").doc();
                            batch.set(docRef, {
                                year: parseInt(year),
                                month: parseInt(month),
                                date: transaction.date,
                                type: transaction.type,
                                amount: transaction.amount,
                                desc: transaction.desc,
                                createdAt: new Date()
                            });
                        });
                    }
                }

                await batch.commit();

                // 년도 기본값을 2026으로 설정
