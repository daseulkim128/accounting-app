<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会計帳簿(회계장부)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        /* 전체 페이지 기본 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            transition: background 0.3s ease;
        }

        body.dark-mode .container {
            background: #0f3460;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* 페이지 제목 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        body.dark-mode .title {
            color: #e0e0e0;
        }

        /* 헤더 버튼들 컨테이너 */
        .header-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* 테마 토글 버튼과 다운로드 버튼 공통 스타일 */
        .theme-toggle,
        .download-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .theme-toggle:hover,
        .download-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        body.dark-mode .theme-toggle,
        body.dark-mode .download-btn {
            background: #764ba2;
        }

        body.dark-mode .theme-toggle:hover,
        body.dark-mode .download-btn:hover {
            background: #667eea;
        }

        /* ===== 월 선택 섹션 ===== */
        .month-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .month-btn {
            padding: 12px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        body.dark-mode .month-btn {
            background: #1a2332;
            color: #667eea;
            border-color: #667eea;
        }

        /* 선택된 월 버튼 스타일 */
        .month-btn.active {
            background: #667eea;
            color: white;
        }

        .month-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        /* ===== 데이터 입력 섹션 ===== */
        .input-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
        }

        body.dark-mode .input-section {
            background: #1a2332;
            border-color: #2a3f5f;
        }

        .input-section h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        body.dark-mode .input-section h3 {
            color: #e0e0e0;
        }

        /* 입력 폼 그리드 */
        .form-group {
            display: grid;
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 입력 필드 공통 스타일 */
        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        body.dark-mode input,
        body.dark-mode select {
            background: #0f3460 !important;
            color: #e0e0e0 !important;
            border-color: #2a3f5f !important;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        /* 추가 버튼 */
        .add-btn {
            background: #51cf66;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
            align-self: center;
        }

        .add-btn:hover {
            background: #40c057;
            transform: translateY(-2px);
        }

        /* ===== 회계 테이블 섹션 ===== */
        .table-section {
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .table-section h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        body.dark-mode .table-section h3 {
            color: #e0e0e0;
        }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode table {
            background: #1a2332;
        }

        /* 테이블 헤더 */
        table thead {
            background: #667eea;
            color: white;
        }

        body.dark-mode table thead {
            background: #764ba2;
        }

        table th {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        /* 테이블 바디 */
        table tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s ease;
        }

        body.dark-mode table tbody tr {
            border-bottom-color: #2a3f5f;
        }

        table tbody tr:hover {
            background: #f5f5f5;
        }

        body.dark-mode table tbody tr:hover {
            background: #2a3f5f;
        }

        table td {
            padding: 12px 15px;
            text-align: center;
            font-size: 14px;
            color: #333;
        }

        body.dark-mode table td {
            color: #e0e0e0;
        }

        /* 날짜 열은 왼쪽 정렬 */
        table td:first-child {
            text-align: left;
            font-weight: bold;
        }

        /* 수입 금액 - 녹색 */
        .income {
            color: #51cf66;
            font-weight: bold;
        }

        /* 지출 금액 - 빨강 */
        .expense {
            color: #ff6b6b;
            font-weight: bold;
        }

        /* 잔액 */
        .balance {
            font-weight: bold;
            color: #667eea;
        }

        body.dark-mode .balance {
            color: #82b1ff;
        }

        /* 빈 상태 메시지 */
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        body.dark-mode .empty-message {
            color: #888;
        }

        /* ===== 월말 합계 섹션 ===== */
        .summary-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .summary-card {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .summary-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: bold;
        }

        /* 합계별 색상 구분 */
        .total-income .summary-value {
            color: #51cf66;
        }

        .total-expense .summary-value {
            color: #ff9999;
        }

        .total-balance .summary-value {
            color: #fff;
        }

        /* 설명 텍스트 */
        .description-column {
            max-width: 200px;
            white-space: normal;
            word-break: break-word;
        }

        /* 삭제 버튼 */
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        /* 체크박스 스타일 */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        /* 선택된 행 스타일 */
        table tbody tr.selected {
            background: rgba(102, 126, 234, 0.1);
        }

        body.dark-mode table tbody tr.selected {
            background: rgba(102, 126, 234, 0.2);
        }

        /* 월초 이월금 행 스타일 */
        table tbody tr.carryover-row {
            background: #f0f0f0;
            font-weight: bold;
        }

        body.dark-mode table tbody tr.carryover-row {
            background: #1f2937;
        }

        /* ===== OCR 사진 입력 섹션 ===== */
        .ocr-section {
            background: #f0f8ff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px dashed #667eea;
        }

        body.dark-mode .ocr-section {
            background: #1a2a3a;
            border-color: #764ba2;
        }

        .ocr-section h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        body.dark-mode .ocr-section h3 {
            color: #e0e0e0;
        }

        .ocr-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .ocr-file-input {
            padding: 12px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        body.dark-mode .ocr-file-input {
            background: #0f3460;
            color: #e0e0e0;
            border-color: #764ba2;
        }

        .ocr-file-input:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .ocr-recognize-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .ocr-recognize-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .ocr-recognize-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* OCR 미리보기 모달 */
        .ocr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .ocr-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ocr-modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        body.dark-mode .ocr-modal-content {
            background: #0f3460;
        }

        .ocr-modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark-mode .ocr-modal-header {
            color: #e0e0e0;
        }

        .ocr-modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .ocr-modal-close:hover {
            color: #333;
        }

        body.dark-mode .ocr-modal-close:hover {
            color: #e0e0e0;
        }

        .ocr-preview-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .ocr-preview-table thead {
            background: #667eea;
            color: white;
        }

        body.dark-mode .ocr-preview-table thead {
            background: #764ba2;
        }

        .ocr-preview-table th,
        .ocr-preview-table td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        body.dark-mode .ocr-preview-table td {
            border-color: #2a3f5f;
            color: #e0e0e0;
        }

        .ocr-preview-table input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        body.dark-mode .ocr-preview-table input {
            background: #1a2332;
            color: #e0e0e0;
            border-color: #2a3f5f;
        }

        .ocr-preview-table select {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        body.dark-mode .ocr-preview-table select {
            background: #1a2332;
            color: #e0e0e0;
            border-color: #2a3f5f;
        }

        .ocr-modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .ocr-register-btn {
            background: #51cf66;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .ocr-register-btn:hover {
            background: #40c057;
            transform: translateY(-2px);
        }

        .ocr-cancel-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .ocr-cancel-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        /* 로딩 애니메이션 */
        .ocr-loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .ocr-loading.active {
            display: block;
        }

        .ocr-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: ocr-spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes ocr-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 반응형 모바일 설정 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .title {
                font-size: 24px;
            }

            .summary-section {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            table th, table td {
                padding: 10px 8px;
            }

            .ocr-modal-content {
                width: 95%;
                padding: 20px;
            }

            .ocr-input-group {
                flex-direction: column;
            }

            .ocr-file-input,
            .ocr-recognize-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 메인 컨테이너 -->
    <div class="container">
        <!-- 페이지 헤더 -->
        <div class="header">
            <div class="title">📊 会計帳簿<br><small style="font-size: 0.7em; opacity: 0.8;">(회계장부)</small></div>
            <div class="header-buttons">
                <button class="download-btn" onclick="downloadExcel()">📥 エクセルダウンロード(엑셀다운로드)</button>
                <button class="download-btn" onclick="goToStats()">📈 統計(통계)</button>
                <button class="download-btn" onclick="loadSampleData()" style="background: #ff8c42;">📋 サンプルデータ(샘플데이터)</button>
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>
        </div>

        <!-- 년도 및 월 선택 섹션 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap;">
            <!-- 년도 선택 -->
            <div id="yearButtons" style="display: flex; gap: 10px; align-items: center;">
                <button class="month-btn" onclick="selectYear(2024)">2024年</button>
                <button class="month-btn" onclick="selectYear(2025)">2025年</button>
                <button class="month-btn active" onclick="selectYear(2026)">2026年</button>
                <span id="yearDisplay" style="font-weight: bold; color: #667eea; margin-left: 10px;">2026年</span>
            </div>
        </div>

        <!-- 월 선택 버튼들 -->
        <div class="month-selector">
            <button class="month-btn active" onclick="selectMonth(1)">1月</button>
            <button class="month-btn" onclick="selectMonth(2)">2月</button>
            <button class="month-btn" onclick="selectMonth(3)">3月</button>
            <button class="month-btn" onclick="selectMonth(4)">4月</button>
            <button class="month-btn" onclick="selectMonth(5)">5月</button>
            <button class="month-btn" onclick="selectMonth(6)">6月</button>
            <button class="month-btn" onclick="selectMonth(7)">7月</button>
            <button class="month-btn" onclick="selectMonth(8)">8月</button>
            <button class="month-btn" onclick="selectMonth(9)">9月</button>
            <button class="month-btn" onclick="selectMonth(10)">10月</button>
            <button class="month-btn" onclick="selectMonth(11)">11月</button>
            <button class="month-btn" onclick="selectMonth(12)">12月</button>
        </div>

        <!-- 데이터 입력 섹션 -->
        <div class="input-section">
            <h3>💰 取引入力(거래입력)</h3>
            <div class="form-group" style="grid-template-columns: 0.8fr 0.8fr 0.8fr 1fr 1fr auto; gap: 8px;">
                <!-- 연도 선택 -->
                <select id="transactionYear" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">年度(연도)</option>
                </select>

                <!-- 월 선택 -->
                <select id="transactionMonth" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">月(월)</option>
                </select>

                <!-- 일 선택 -->
                <select id="transactionDay" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">日(일)</option>
                </select>

                <!-- 거래 유형 선택 (수입/지출) -->
                <select id="transactionType">
                    <option value="income">収入(수입)</option>
                    <option value="expense">支出(지출)</option>
                </select>

                <!-- 금액 입력 -->
                <input
                    type="text"
                    id="transactionAmount"
                    placeholder="金額(금액)"
                    oninput="formatAmountInput(this)"
                >

                <!-- 추가 버튼 -->
                <button class="add-btn" onclick="addTransaction()">追加(추가)</button>
            </div>

            <!-- 거래 설명 -->
            <div style="margin-top: 15px;">
                <input
                    type="text"
                    id="transactionDesc"
                    placeholder="説明(설明) (例:人件費、燃料費)"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;"
                >
            </div>
        </div>

        <!-- 사진으로 입력 섹션 -->
        <div class="ocr-section">
            <h3>📷 사진으로 등록하기(사진 인식)</h3>
            <div class="ocr-input-group">
                <input
                    type="file"
                    id="ocrImageInput"
                    accept="image/*"
                    style="display: none;"
                    onchange="handleImageSelect(event)"
                >
                <button class="ocr-file-input" onclick="document.getElementById('ocrImageInput').click()">
                    📁 사진 선택(選択)
                </button>
                <button class="ocr-recognize-btn" id="ocrRecognizeBtn" onclick="startOCRRecognition()" disabled>
                    🔍 사진 인식하기(認識)
                </button>
                <span id="ocrFileName" style="color: #667eea; font-weight: 600;">선택된 파일 없음</span>
            </div>
            <div class="ocr-loading" id="ocrLoading">
                <div class="ocr-spinner"></div>
                <p style="color: #667eea; margin-top: 10px;">사진 인식 중입니다... (사진이 크면 30초 이상 걸릴 수 있습니다)</p>
            </div>
        </div>

        <!-- OCR 미리보기 모달 -->
        <div class="ocr-modal" id="ocrModal">
            <div class="ocr-modal-content">
                <div class="ocr-modal-header">
                    <span>📋 인식된 거래 확인(確認)</span>
                    <button class="ocr-modal-close" onclick="closeOCRModal()">✕</button>
                </div>
                <table class="ocr-preview-table">
                    <thead>
                        <tr>
                            <th>日(일)</th>
                            <th>説明(설명)</th>
                            <th>収入(수입)</th>
                            <th>支出(지출)</th>
                        </tr>
                    </thead>
                    <tbody id="ocrPreviewBody">
                    </tbody>
                </table>
                <div class="ocr-modal-buttons">
                    <button class="ocr-cancel-btn" onclick="closeOCRModal()">取消(취소)</button>
                    <button class="ocr-register-btn" onclick="registerOCRTransactions()">登録(등록)</button>
                </div>
            </div>
        </div>

        <!-- 거래 내역 테이블 -->
        <div class="table-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">📋 取引履歴(거래내역)</h3>
                <button class="delete-btn" id="deleteSelectedBtn" onclick="deleteSelected()" style="display: none; background: #ff6b6b;">🗑️ 選択削除(선택삭제)</button>
            </div>
            <table id="transactionTable">
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                        <th>日付(날짜)</th>
                        <th>収入(수입)</th>
                        <th>支出(지출)</th>
                        <th>残高(잔액)</th>
                        <th>説明(설명)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="6" class="empty-message">取引履歴がありません。取引を入力してください。(거래 내역이 없습니다. 거래를 입력해주세요.)</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 월말 합계 섹션 -->
        <div class="summary-section">
            <div class="summary-card total-income">
                <div class="summary-label">今月収入(이달 수입)</div>
                <div class="summary-value" id="totalIncome">0円</div>
            </div>
            <div class="summary-card total-expense">
                <div class="summary-label">今月支出(이달 지출)</div>
                <div class="summary-value" id="totalExpense">0円</div>
            </div>
            <div class="summary-card total-balance">
                <div class="summary-label">月末残高(월말 잔액)</div>
                <div class="summary-value" id="totalBalance">0円</div>
            </div>
        </div>
    </div>

    <script>
        // ===== 会計帳簿 データ管理 =====

        // ローカルストレージに保存された取引データを取得
        // 構造: { year: { month: [{ date, type, amount, desc }] } }
        let accountingData = JSON.parse(localStorage.getItem('accountingData')) || {};

        // 現在選択されている年度と月
        let currentYear = new Date().getFullYear();
        let currentMonth = 1;

        // ===== 年度選択関数 =====
        function selectYear(year) {
            currentYear = year;

            // 年度ボタン active クラス更新
            document.querySelectorAll('#yearButtons .month-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 年度表示更新
            document.getElementById('yearDisplay').innerText = year + '年';

            // 選択された年度/月の取引履歴を表示
            displayTransactions();
        }

        // ===== 月選択関数 =====

        // ユーザーが月ボタンをクリックしたときに実行
        function selectMonth(month) {
            // 現在の月を更新
            currentMonth = month;

            // 前に選択されたボタンの'active'クラスを削除
            document.querySelectorAll('.month-selector .month-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 新しく選択されたボタンに'active'クラスを追加
            event.target.classList.add('active');

            // 選択された月の取引履歴を表示
            displayTransactions();
        }

        // ===== 日付順ソート関数 =====
        function sortTransactionsByDate(year, month) {
            if (accountingData[year] && accountingData[year][month]) {
                accountingData[year][month].sort((a, b) =>
                    new Date(a.date) - new Date(b.date)
                );
            }
        }

        // ===== 金額リアルタイムフォーマット関数 =====
        function formatAmountInput(input) {
            // 数字のみ抽出
            let value = input.value.replace(/[^\d]/g, '');

            // コンマを追加
            if (value) {
                value = parseInt(value).toLocaleString();
            }

            input.value = value;
        }

        // ===== 選択ボックス初期化関数 =====
        function initializeDateSelectors() {
            // 年度セレクトボックスを埋める (2025-2035)
            const yearSelect = document.getElementById('transactionYear');
            yearSelect.innerHTML = '<option value="">年度(연도)</option>';
            for (let year = 2025; year <= 2035; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.text = year + '年';
                yearSelect.appendChild(option);
            }

            // 月セレクトボックスを埋める
            const monthSelect = document.getElementById('transactionMonth');
            monthSelect.innerHTML = '<option value="">月(월)</option>';
            for (let month = 1; month <= 12; month++) {
                const option = document.createElement('option');
                option.value = month.toString().padStart(2, '0');
                option.text = month + '月';
                monthSelect.appendChild(option);
            }

            // 日セレクトボックスを埋める
            const daySelect = document.getElementById('transactionDay');
            daySelect.innerHTML = '<option value="">日(일)</option>';
            for (let day = 1; day <= 31; day++) {
                const option = document.createElement('option');
                option.value = day.toString().padStart(2, '0');
                option.text = day + '日';
                daySelect.appendChild(option);
            }
        }

        // ===== 取引追加関数 =====

        // ユーザーが取引を入力して「追加」ボタンをクリックしたとき
        function addTransaction() {
            // 入力フィールドから値を取得
            const year = parseInt(document.getElementById('transactionYear').value);
            const month = parseInt(document.getElementById('transactionMonth').value);
            const day = parseInt(document.getElementById('transactionDay').value);
            const type = document.getElementById('transactionType').value;
            const amountText = document.getElementById('transactionAmount').value;
            const desc = document.getElementById('transactionDesc').value;

            // 入力値の検証 (すべてのフィールドが入力されているか確認)
            if (!year || !month || !day || !amountText || !desc) {
                alert('すべての項目を入力してください！(모든 항목을 입력해주세요!)');
                return;
            }

            // 年度検証
            if (year !== currentYear) {
                alert(`現在選択されている年度は${currentYear}年です。\n${year}年のデータは入力できません。(현재 선택된 연도는 ${currentYear}년입니다.\n${year}년 데이터는 입력할 수 없습니다.)`);
                return;
            }

            // 月検証
            if (month !== currentMonth) {
                alert(`現在選択されている月は${currentMonth}月です。\n${month}月のデータは入力できません。(현재 선택된 월은 ${currentMonth}월입니다.\n${month}월 데이터는 입력할 수 없습니다.)`);
                return;
            }

            // 金額解析 (コンマを削除)
            const amount = parseFloat(amountText.replace(/,/g, ''));

            // 金額が0以上であることを確認
            if (amount <= 0) {
                alert('金額は0より大きくしてください！(금액은 0보다 커야 합니다!)');
                return;
            }

            // 日付組み合わせ (YYYY-MM-DD形式)
            const date = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;

            // 対応する年度がない場合は作成
            if (!accountingData[currentYear]) {
                accountingData[currentYear] = {};
            }

            // 対応する月がデータ構造にない場合は空の配列で初期化
            if (!accountingData[currentYear][currentMonth]) {
                accountingData[currentYear][currentMonth] = [];
            }

            // 新しい取引を現在の月の配列に追加
            accountingData[currentYear][currentMonth].push({
                date: date,
                type: type,
                amount: parseFloat(amount),
                desc: desc
            });

            // 日付順でソート
            sortTransactionsByDate(currentYear, currentMonth);

            // データをローカルストレージに保存
            localStorage.setItem('accountingData', JSON.stringify(accountingData));

            // 入力フィールドを初期化 (次の入力のためにクリア)
            document.getElementById('transactionYear').value = '';
            document.getElementById('transactionMonth').value = '';
            document.getElementById('transactionDay').value = '';
            document.getElementById('transactionAmount').value = '';
            document.getElementById('transactionDesc').value = '';

            // 取引履歴テーブルを再描画
            displayTransactions();
        }

        // ===== 前月末残額計算 =====
        function getPreviousMonthBalance(year, month) {
            let previousYear = year;
            let previousMonth = month - 1;

            // 1月の場合は前年度12月
            if (previousMonth < 1) {
                previousYear = year - 1;
                previousMonth = 12;
            }

            const previousTransactions = (accountingData[previousYear] && accountingData[previousYear][previousMonth]) || [];
            let balance = 0;

            previousTransactions.forEach(transaction => {
                if (transaction.type === 'income') {
                    balance += transaction.amount;
                } else {
                    balance -= transaction.amount;
                }
            });

            return balance;
        }

        // ===== 取引履歴表示関数 =====

        // 現在の月の取引履歴をテーブルに表示
        function displayTransactions() {
            // テーブルボディを選択
            const tableBody = document.getElementById('tableBody');
            const selectAll = document.getElementById('selectAll');

            // レンダリング前にデータをソート (常に最新の状態を保つ)
            sortTransactionsByDate(currentYear, currentMonth);

            // 現在の月の取引データを取得
            const transactions = (accountingData[currentYear] && accountingData[currentYear][currentMonth]) || [];

            // すべて選択チェックボックスを初期化
            selectAll.checked = false;

            // 取引がない場合は空の状態メッセージを表示
            if (transactions.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="empty-message">取引履歴がありません。取引を入力してください。(거래 내역이 없습니다. 거래를 입력해주세요.)</td></tr>';
                updateSummary();
                updateDeleteButton();
                return;
            }

            // テーブル内容を初期化
            tableBody.innerHTML = '';

            // 前月残額を繰越
            const previousBalance = getPreviousMonthBalance(currentYear, currentMonth);
            let runningBalance = previousBalance;

            // 前月残額がある場合は最初の行に繰越金を表示
            if (previousBalance !== 0) {
                const carryOverRow = document.createElement('tr');
                carryOverRow.classList.add('carryover-row');
                carryOverRow.innerHTML = `
                    <td></td>
                    <td style="color: #667eea;">📌 月初繰越金(월초 이월금)</td>
                    <td></td>
                    <td></td>
                    <td class="balance" style="color: #667eea;">${previousBalance.toLocaleString()}円</td>
                    <td style="color: #888;">前月繰越(전월 이월)</td>
                `;
                tableBody.appendChild(carryOverRow);
            }

            // 各取引についてテーブル行を作成
            transactions.forEach((transaction, index) => {
                // 取引タイプに応じて残額を計算
                if (transaction.type === 'income') {
                    // 収入の場合は残額を増加
                    runningBalance += transaction.amount;
                } else {
                    // 支出の場合は残額を減少
                    runningBalance -= transaction.amount;
                }

                // テーブル行を作成
                const row = document.createElement('tr');
                row.setAttribute('data-index', index);

                // 日付を見やすい形式に変換 (2024-01-15 → 1月15日)
                const dateObj = new Date(transaction.date + 'T00:00:00');
                const formattedDate = (dateObj.getMonth() + 1) + '月' + dateObj.getDate() + '日';

                // 行のHTML作成 (チェックボックスを追加)
                row.innerHTML = `
                    <td><input type="checkbox" class="row-checkbox" onchange="updateDeleteButton()"></td>
                    <td>${formattedDate}</td>
                    <td class="${transaction.type === 'income' ? 'income' : ''}">${transaction.type === 'income' ? transaction.amount.toLocaleString() + '円' : ''}</td>
                    <td class="${transaction.type === 'expense' ? 'expense' : ''}">${transaction.type === 'expense' ? transaction.amount.toLocaleString() + '円' : ''}</td>
                    <td class="balance">${runningBalance.toLocaleString()}円</td>
                    <td class="description-column">${transaction.desc}</td>
                `;

                // チェックボックスクリック時に行を強調表示
                const checkbox = row.querySelector('.row-checkbox');
                checkbox.addEventListener('change', function() {
                    if (this.checked) {
                        row.classList.add('selected');
                    } else {
                        row.classList.remove('selected');
                    }
                });

                // テーブルに行を追加
                tableBody.appendChild(row);
            });

            // 月末合計を更新
            updateSummary();
            updateDeleteButton();
        }

        // ===== すべて選択トグル =====
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.row-checkbox');

            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
                const row = checkbox.closest('tr');
                if (selectAll.checked) {
                    row.classList.add('selected');
                } else {
                    row.classList.remove('selected');
                }
            });

            updateDeleteButton();
        }

        // ===== 選択削除ボタン更新 =====
        function updateDeleteButton() {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            const selectedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
            const deleteBtn = document.getElementById('deleteSelectedBtn');

            if (selectedCount > 0) {
                deleteBtn.style.display = 'block';
                deleteBtn.innerText = `🗑️ 選択削除(선택삭제) (${selectedCount}件)`;
            } else {
                deleteBtn.style.display = 'none';
            }
        }

        // ===== 選択項目一括削除 =====
        function deleteSelected() {
            const selectedCount = Array.from(document.querySelectorAll('.row-checkbox'))
                .filter(cb => cb.checked).length;

            if (selectedCount === 0) {
                alert('削除する項目を選択してください！(삭제할 항목을 선택해주세요!)');
                return;
            }

            if (confirm(`${selectedCount}件の取引を削除しますか？(${selectedCount}개의 거래를 삭제하시겠습니까?)`)) {
                const checkboxes = document.querySelectorAll('.row-checkbox');
                const indicesToDelete = [];

                checkboxes.forEach((checkbox, index) => {
                    if (checkbox.checked) {
                        indicesToDelete.push(index);
                    }
                });

                // 後ろから削除 (インデックス変更を防止)
                for (let i = indicesToDelete.length - 1; i >= 0; i--) {
                    accountingData[currentYear][currentMonth].splice(indicesToDelete[i], 1);
                }

                // 日付順でソート
                sortTransactionsByDate(currentYear, currentMonth);

                // ローカルストレージを更新
                localStorage.setItem('accountingData', JSON.stringify(accountingData));

                // テーブルを再描画
                displayTransactions();

                alert(`${selectedCount}件の取引が削除されました！(${selectedCount}개의 거래가 삭제되었습니다!)`);
            }
        }


        // ===== 月末合計計算と表示 =====

        // 今月の総収入、総支出、残額を計算
        function updateSummary() {
            // 現在の月の取引データを取得
            const transactions = (accountingData[currentYear] && accountingData[currentYear][currentMonth]) || [];

            // 総収入と総支出を計算
            let totalIncome = 0;  // 総収入
            let totalExpense = 0; // 総支出

            // 各取引について収入/支出合計を計算
            transactions.forEach(transaction => {
                if (transaction.type === 'income') {
                    // 収入合計に追加
                    totalIncome += transaction.amount;
                } else {
                    // 支出合計に追加
                    totalExpense += transaction.amount;
                }
            });

            // 前月残額 + 今月純利益 = 月末残額
            const previousBalance = getPreviousMonthBalance(currentYear, currentMonth);
            const currentBalance = totalIncome - totalExpense;
            let totalBalance = previousBalance + currentBalance;

            // 合計を画面に表示
            document.getElementById('totalIncome').innerText = totalIncome.toLocaleString() + '円';
            document.getElementById('totalExpense').innerText = totalExpense.toLocaleString() + '円';
            document.getElementById('totalBalance').innerText = totalBalance.toLocaleString() + '円';
        }

        // ===== ダークモード切り替え関数 =====

        // 明るいテーマと暗いテーマの切り替え
        function toggleTheme() {
            // bodyにdark-modeクラスを切り替え
            document.body.classList.toggle('dark-mode');

            // ユーザーの選択をローカルストレージに保存
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }

        // ===== エクセルダウンロード関数 (CSV形式) =====

        // 現在の月の取引履歴をCSVファイルでダウンロード
        function downloadExcel() {
            // 現在の月の取引データを取得
            const transactions = (accountingData[currentYear] && accountingData[currentYear][currentMonth]) || [];

            // 取引がない場合はアラート
            if (transactions.length === 0) {
                alert('ダウンロードする取引履歴がありません！(다운로드할 거래 내역이 없습니다!)');
                return;
            }

            // 月名配列 (1月 ~ 12月)
            const monthNames = ['', '1月', '2月', '3月', '4月', '5月', '6月',
                               '7月', '8月', '9月', '10月', '11月', '12月'];

            // CSVデータを文字列として生成
            let csvContent = '';

            // タイトル
            csvContent += monthNames[currentMonth] + ' 会計帳簿\n\n';

            // カラムヘッダー
            csvContent += '日付,収入,支出,残高,説明\n';

            // 取引を日付順にソート
            const sortedTransactions = [...transactions].sort((a, b) =>
                new Date(a.date) - new Date(b.date)
            );

            // 累積残額
            let runningBalance = 0;

            // 各取引をCSV行に変換
            sortedTransactions.forEach(transaction => {
                // 取引タイプに応じて残額を計算
                if (transaction.type === 'income') {
                    runningBalance += transaction.amount;
                } else {
                    runningBalance -= transaction.amount;
                }

                // 日付フォーマット
                const dateObj = new Date(transaction.date + 'T00:00:00');
                const formattedDate = (dateObj.getMonth() + 1) + '月' + dateObj.getDate() + '日';

                // 収入/支出の区分
                const income = transaction.type === 'income' ? transaction.amount : '';
                const expense = transaction.type === 'expense' ? transaction.amount : '';

                // CSV行を追加 (カンマで区切り)
                csvContent += formattedDate + ',' +
                             income + ',' +
                             expense + ',' +
                             runningBalance + ',' +
                             '"' + transaction.desc + '"\n'; // 説明はダブルクォートで囲む
            });

            // 空の行を追加
            csvContent += '\n';

            // 合計行を計算
            let totalIncome = 0;
            let totalExpense = 0;
            transactions.forEach(transaction => {
                if (transaction.type === 'income') {
                    totalIncome += transaction.amount;
                } else {
                    totalExpense += transaction.amount;
                }
            });
            const totalBalance = totalIncome - totalExpense;

            // 合計行を追加
            csvContent += '合計,' + totalIncome + ',' + totalExpense + ',' + totalBalance + ',\n';

            // Blobオブジェクトを作成 (ファイルデータ)
            const blob = new Blob(['﻿' + csvContent], { type: 'text/csv;charset=utf-8;' });

            // 一時的なダウンロードリンクを作成
            const link = document.createElement('a');

            // BlobデータをURLに変換
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);

            // ファイル名: "会計帳簿_1月.csv" 形式
            const fileName = '会計帳簿_' + monthNames[currentMonth] + '.csv';
            link.setAttribute('download', fileName);

            // リンクをページに追加 (表示されない)
            link.style.visibility = 'hidden';
            document.body.appendChild(link);

            // クリックしてダウンロード開始
            link.click();

            // リンクを削除
            document.body.removeChild(link);

            // ダウンロード完了アラート
            alert(fileName + ' ファイルがダウンロードされました！\n(エクセルでも開くことができます)\n(' + fileName + ' 파일이 다운로드 되었습니다!\n(엑셀에서도 열 수 있습니다))');
        }

        // ===== 統計ページへの移動 =====
        function goToStats() {
            window.location.href = 'accounting-stats.html';
        }

        // ===== サンプルデータ読み込み/クリア (トグル) =====
        function loadSampleData() {
            // 現在のデータがあるか確認
            const hasData = Object.keys(accountingData).some(year =>
                accountingData[year] && Object.keys(accountingData[year]).some(month =>
                    accountingData[year][month] && accountingData[year][month].length > 0
                )
            );

            if (hasData) {
                // データがある場合はすべてクリア
                if (confirm('すべてのデータを削除しますか？(모든 데이터를 삭제하시겠습니까?)')) {
                    accountingData = {};
                    localStorage.setItem('accountingData', JSON.stringify(accountingData));
                    alert('すべてのデータが削除されました！(모든 데이터가 삭제되었습니다!)');
                    location.reload();
                }
            } else {
                // データがない場合はサンプルデータを読み込み
                const sampleData = {
                    2026: {
                        1: [ // 1月

        // ===== OCR 관련 함수 =====

        // OCR에 사용할 전역 변수
        let selectedImageFile = null;
        let ocrRecognitionResult = null;

        // 이미지 파일 선택 처리
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (file) {
                // 파일 형식 검증
                if (!file.type.startsWith('image/')) {
                    alert('이미지 파일을 선택해주세요! (이미지 파일만 업로드 가능)');
                    return;
                }

                selectedImageFile = file;
                document.getElementById('ocrFileName').innerText = `선택됨: ${file.name}`;
                document.getElementById('ocrRecognizeBtn').disabled = false;
            }
        }

        // OCR 인식 시작
        async function startOCRRecognition() {
            if (!selectedImageFile) {
                alert('사진을 선택해주세요!');
                return;
            }

            // 로딩 표시
            document.getElementById('ocrLoading').classList.add('active');
            document.getElementById('ocrRecognizeBtn').disabled = true;

            try {
                // 이미지를 Base64로 변환
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const imageData = e.target.result;

                        // Tesseract.js를 사용한 OCR
                        const result = await Tesseract.recognize(
                            imageData,
                            'jpn', // 일본어
                            {
                                logger: m => console.log('OCR Progress:', m)
                            }
                        );

                        const ocrText = result.data.text;
                        console.log('OCR 결과:', ocrText);

                        // 텍스트 파싱
                        const transactions = parseTransactionData(ocrText);

                        if (transactions.length === 0) {
                            alert('인식된 거래가 없습니다. 사진을 다시 선택해주세요.');
                            document.getElementById('ocrLoading').classList.remove('active');
                            document.getElementById('ocrRecognizeBtn').disabled = false;
                            return;
                        }

                        // OCR 결과 저장
                        ocrRecognitionResult = transactions;

                        // 미리보기 표시
                        showOCRPreview(transactions);

                        // 로딩 숨기기
                        document.getElementById('ocrLoading').classList.remove('active');
                        document.getElementById('ocrRecognizeBtn').disabled = false;
                    } catch (error) {
                        console.error('OCR 처리 중 오류:', error);
                        alert('사진 인식 중 오류가 발생했습니다. 다시 시도해주세요.');
                        document.getElementById('ocrLoading').classList.remove('active');
                        document.getElementById('ocrRecognizeBtn').disabled = false;
                    }
                };
                reader.readAsDataURL(selectedImageFile);
            } catch (error) {
                console.error('파일 처리 오류:', error);
                alert('파일 처리 중 오류가 발생했습니다.');
                document.getElementById('ocrLoading').classList.remove('active');
                document.getElementById('ocrRecognizeBtn').disabled = false;
            }
        }

        // OCR 텍스트 파싱
        function parseTransactionData(ocrText) {
            const transactions = [];
            const lines = ocrText.split('\n').filter(line => line.trim());

            // 정규식으로 날짜, 금액, 설명 추출
            // 형식 예: 5/7 (주)코스모-그린 1560000
            //         5/7 다일리 440
            // 월/일 | 설명 | 금액

            let currentDay = null;

            for (let line of lines) {
                line = line.trim();

                // 월/일 패턴 매칭 (예: 5/7, 08/15)
                const dateMatch = line.match(/^(\d{1,2})\/(\d{1,2})/);
                if (dateMatch) {
                    currentDay = dateMatch[1] + '/' + dateMatch[2];
                }

                // 숫자 패턴 추출 (금액)
                const amountMatch = line.match(/(\d+,?\d*)/);

                if (amountMatch && currentDay) {
                    const amount = parseInt(amountMatch[1].replace(/,/g, ''));

                    // 설명 추출 (날짜와 금액 제거 후 남은 텍스트)
                    let desc = line
                        .replace(/^\d{1,2}\/\d{1,2}/, '') // 날짜 제거
                        .replace(/(\d+,?\d*)/, '') // 금액 제거
                        .trim();

                    // 한 글자 이상의 설명이 있고 금액이 0보다 크면 추가
                    if (desc.length > 0 && amount > 0) {
                        // 수입/지출 자동 판단 (일반적으로 큰 금액은 수입, 작은 금액은 지출)
                        // 또는 설명에 특정 키워드가 있는지 확인
                        const type = (amount > 500000 || desc.includes('收入') || desc.includes('기성금'))
                            ? 'income'
                            : 'expense';

                        transactions.push({
                            day: currentDay,
                            desc: desc,
                            amount: amount,
                            type: type
                        });
                    }
                }
            }

            return transactions;
        }

        // OCR 미리보기 표시
        function showOCRPreview(transactions) {
            const tbody = document.getElementById('ocrPreviewBody');
            tbody.innerHTML = '';

            transactions.forEach((transaction, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <input type="text" value="${transaction.day}"
                            onchange="ocrRecognitionResult[${index}].day = this.value"
                            placeholder="월/일">
                    </td>
                    <td>
                        <input type="text" value="${transaction.desc}"
                            onchange="ocrRecognitionResult[${index}].desc = this.value"
                            placeholder="설명">
                    </td>
                    <td>
                        <input type="text" value="${transaction.type === 'income' ? transaction.amount.toLocaleString() : ''}"
                            onchange="ocrRecognitionResult[${index}].type = 'income'; ocrRecognitionResult[${index}].amount = parseInt(this.value.replace(/,/g, '') || 0)"
                            placeholder="수입">
                    </td>
                    <td>
                        <input type="text" value="${transaction.type === 'expense' ? transaction.amount.toLocaleString() : ''}"
                            onchange="ocrRecognitionResult[${index}].type = 'expense'; ocrRecognitionResult[${index}].amount = parseInt(this.value.replace(/,/g, '') || 0)"
                            placeholder="지출">
                    </td>
                `;
                tbody.appendChild(row);
            });

            // 모달 표시
            document.getElementById('ocrModal').classList.add('active');
        }

        // OCR 미리보기 모달 닫기
        function closeOCRModal() {
            document.getElementById('ocrModal').classList.remove('active');
            ocrRecognitionResult = null;
            selectedImageFile = null;
            document.getElementById('ocrImageInput').value = '';
            document.getElementById('ocrFileName').innerText = '선택된 파일 없음';
            document.getElementById('ocrRecognizeBtn').disabled = true;
        }

        // OCR 거래 일괄 등록
        function registerOCRTransactions() {
            if (!ocrRecognitionResult || ocrRecognitionResult.length === 0) {
                alert('등록할 거래가 없습니다.');
                return;
            }

            // 현재 선택된 연도/월 확인
            if (!currentYear || !currentMonth) {
                alert('먼저 연도와 월을 선택해주세요!');
                return;
            }

            let successCount = 0;
            let errorCount = 0;
            let errors = [];

            // 각 거래 등록
            ocrRecognitionResult.forEach((transaction, index) => {
                try {
                    // 날짜 파싱 (월/일 → YYYY-MM-DD)
                    const dayParts = transaction.day.split('/');
                    if (dayParts.length !== 2) {
                        throw new Error(`날짜 형식 오류: ${transaction.day}`);
                    }

                    const month = parseInt(dayParts[0]);
                    const day = parseInt(dayParts[1]);

                    if (month !== currentMonth) {
                        errors.push(`${index + 1}번 거래: 현재 월(${currentMonth}월)과 다른 월(${month}월) 데이터는 등록할 수 없습니다.`);
                        errorCount++;
                        return;
                    }

                    const dateStr = `${currentYear}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;

                    // 데이터 검증
                    if (!transaction.desc || transaction.desc.trim().length === 0) {
                        throw new Error('설명이 없습니다.');
                    }
                    if (!transaction.amount || transaction.amount <= 0) {
                        throw new Error('금액이 0 이상이어야 합니다.');
                    }

                    // 데이터 구조 생성
                    if (!accountingData[currentYear]) {
                        accountingData[currentYear] = {};
                    }
                    if (!accountingData[currentYear][currentMonth]) {
                        accountingData[currentYear][currentMonth] = [];
                    }

                    // 거래 추가
                    accountingData[currentYear][currentMonth].push({
                        date: dateStr,
                        type: transaction.type,
                        amount: transaction.amount,
                        desc: transaction.desc
                    });

                    successCount++;
                } catch (error) {
                    console.error(`거래 ${index + 1} 처리 오류:`, error);
                    errors.push(`${index + 1}번 거래: ${error.message}`);
                    errorCount++;
                }
            });

            // 날짜순 정렬
            sortTransactionsByDate(currentYear, currentMonth);

            // localStorage 저장
            localStorage.setItem('accountingData', JSON.stringify(accountingData));

            // 테이블 재렌더링
            displayTransactions();

            // 미리보기 모달 닫기
            closeOCRModal();

            // 결과 메시지
            let message = `${successCount}개의 거래가 등록되었습니다!`;
            if (errorCount > 0) {
                message += `\n\n${errorCount}개의 거래에서 오류가 발생했습니다:\n${errors.join('\n')}`;
            }
            alert(message);
        }

        // ===== ページ読み込み時の初期化 =====

        // ページが最初に読み込まれたときに実行
        window.addEventListener('load', function() {
            // 保存されたテーマ設定を読み込み
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }

            // 日付選択ボックスを初期化
            initializeDateSelectors();

            // 初期取引履歴を表示
            displayTransactions();
        });
